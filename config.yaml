# LiteLLM Configuration File
# Uncomment and customize as needed

model_list:
  # NVIDIA NIM Models
  - model_name: nvidia_nim/openai/gpt-oss-20b
    litellm_params:
      model: nvidia_nim/openai/gpt-oss-20b
      api_key: os.environ/NVIDIA_NIM_API_KEY

  - model_name: nvidia_nim/openai/gpt-oss-120b
    litellm_params:
      model: nvidia_nim/openai/gpt-oss-120b
      api_key: os.environ/NVIDIA_NIM_API_KEY

  # OpenRouter Free Model
  - model_name: openrouter-free
    litellm_params:
      model: openrouter/free
      api_key: os.environ/OPENROUTER_API_KEY

  # Gemini Model
  - model_name: gemini-gemma-4-31b-it
    litellm_params:
      model: gemini/gemma-4-31b-it
      api_key: os.environ/GEMINI_API_KEY

# Router settings
# router_settings:
#   routing_strategy: least-busy
#   num_retries: 3
#   timeout: 300

# General settings
litellm_settings:
  drop_params: false
  set_verbose: false
  # json_logs: true

# Rate limiting (optional)
# general_settings:
#   master_key: os.environ/LITELLM_MASTER_KEY
#   database_url: os.environ/DATABASE_URL

# Success callback (for logging/monitoring)
# success_callback: ["prometheus"]

