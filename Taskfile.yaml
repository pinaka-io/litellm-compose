version: '3'

tasks:
  default:
    desc: Default task - starts the services
    cmds:
      - task: up

  up:
    desc: Start the services
    cmds:
      - docker-compose up -d

  down:
    desc: Stop the services
    cmds:
      - docker-compose down

  down-volumes:
    desc: Stop the services and remove volumes
    cmds:
      - docker-compose down -v
