version: '3'

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list

  up:
    desc: Start the services
    cmds:
      - docker-compose up -d

  down:
    desc: Stop the services
    cmds:
      - docker-compose down

  down-volumes:
    desc: Stop the services and remove volumes
    cmds:
      - docker-compose down -v

  logs:
    desc: View logs (use -f to follow)
    cmds:
      - docker-compose logs {{.CLI_ARGS}}
